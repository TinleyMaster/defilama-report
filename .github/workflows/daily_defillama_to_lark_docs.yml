name: daily-defillama-to-lark-docs

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
      LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
      LARK_DRIVE_FOLDER_TOKEN: ${{ secrets.LARK_DRIVE_FOLDER_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate DefiLlama research pack
        run: npm run research-pack

      - name: Validate Lark environment
        run: |
          node <<'EOF'
          const required = [
            "LARK_APP_ID",
            "LARK_APP_SECRET",
            "LARK_DRIVE_FOLDER_TOKEN",
          ];

          let missing = 0;
          for (const name of required) {
            const value = process.env[name] || "";
            const status = value ? `present (length=${value.length})` : "missing";
            console.log(`${name}: ${status}`);
            if (!value) missing += 1;
          }

          if (missing) {
            process.exitCode = 1;
          }
          EOF

      - name: Validate Lark access token
        run: |
          node <<'EOF'
          async function main() {
            const response = await fetch("https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal", {
              method: "POST",
              headers: {
                "Content-Type": "application/json; charset=utf-8",
              },
              body: JSON.stringify({
                app_id: process.env.LARK_APP_ID,
                app_secret: process.env.LARK_APP_SECRET,
              }),
            });

            const json = await response.json();
            console.log(JSON.stringify({
              http_status: response.status,
              code: json.code,
              msg: json.msg,
              has_tenant_access_token: Boolean(json.tenant_access_token),
            }, null, 2));

            if (!response.ok || json.code !== 0 || !json.tenant_access_token) {
              process.exitCode = 1;
            }
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          EOF

      - name: Import markdown bundle to Lark docs
        run: npm run lark:upload-docs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: defillama-research-pack
          path: |
            20*-*-*/notebooklm/*.md
            20*-*-*/README.md
            20*-*-*/summary.json
            20*-*-*/topic_snapshots.json
            20*-*-*/lark_docs_manifest.json
            20*-*-*/notebooklm/token_report.md
          if-no-files-found: warn
